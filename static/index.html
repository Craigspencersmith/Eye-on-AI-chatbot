<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye on AI — Podcast Chat</title>
    <link rel="icon" type="image/x-icon" href="https://images.squarespace-cdn.com/content/v1/5b75ac0285ede1b470f58ae2/1537897163533-UHZSYHJ2PB2ERFP27XOA/favicon.ico?format=100w"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #1a2456;
            --cyan: #43c6db;
            --cyan-light: #e8f8fb;
            --white: #ffffff;
            --gray-50: #f8f9fa;
            --gray-100: #f0f1f3;
            --gray-200: #e2e4e8;
            --gray-400: #9ba3b0;
            --gray-600: #5a6275;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 14px 24px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 1px 3px rgba(26, 36, 86, 0.04);
        }

        .header-logo {
            height: 40px;
            width: auto;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: -0.01em;
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
        }

        .header .status {
            margin-left: auto;
            font-size: 11px;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header .status::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gray-200);
        }

        .header .status.ready { color: var(--gray-600); }
        .header .status.ready::before { background: var(--cyan); }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--gray-50);
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

        /* Messages */
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--navy);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--white);
            border: 1px solid var(--gray-200);
            color: var(--navy);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(26, 36, 86, 0.04);
        }

        .message.assistant .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--gray-100);
            font-size: 11px;
            color: var(--gray-400);
        }

        .message.assistant .sources span {
            display: inline-block;
            background: var(--cyan-light);
            border: 1px solid #cef0f5;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 2px 4px 2px 0;
            font-size: 11px;
            color: var(--navy);
            font-weight: 500;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--gray-400);
            font-size: 13px;
            text-align: center;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pulse 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* Input area */
        .input-area {
            padding: 16px 24px;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 12px;
            box-shadow: 0 -1px 3px rgba(26, 36, 86, 0.04);
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            color: var(--navy);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-area input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(67, 198, 219, 0.15);
        }

        .input-area input::placeholder {
            color: var(--gray-400);
        }

        .input-area button {
            padding: 14px 28px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .input-area button:hover {
            background: #152048;
        }

        .input-area button:active {
            transform: scale(0.97);
        }

        .input-area button:disabled {
            background: var(--gray-200);
            color: var(--gray-400);
            cursor: not-allowed;
        }

        /* Welcome screen */
        .welcome {
            text-align: center;
            padding: 48px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .welcome-logo {
            width: 160px;
            height: auto;
            margin-bottom: 0px;
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: -0.01em;
            margin-top: -4px;
        }

        .welcome p {
            font-size: 14px;
            color: var(--gray-600);
            max-width: 460px;
            line-height: 1.6;
        }

        .welcome .examples {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%;
            max-width: 480px;
        }

        .welcome .examples button {
            background: var(--white);
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
            padding: 13px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
            box-shadow: 0 1px 2px rgba(26, 36, 86, 0.04);
        }

        .welcome .examples button:hover {
            border-color: var(--cyan);
            color: var(--navy);
            background: var(--cyan-light);
        }

        .welcome .examples button::before {
            content: '→ ';
            color: var(--cyan);
            font-weight: 600;
        }

        /* Footer */
        .powered-by {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--gray-400);
            background: var(--white);
        }

        .powered-by a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 500;
        }

        .powered-by a:hover {
            color: var(--navy);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .message { max-width: 88%; }
            .welcome h2 { font-size: 18px; }
            .welcome-logo { width: 80px; }
            .input-area button { padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/logo.png" alt="Eye on AI" class="header-logo">
        <div class="header-text">
            <h1>Chatbot</h1>
            <span class="subtitle">Search 300+ episodes</span>
        </div>
        <span class="status" id="status">Connecting</span>
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <img src="/static/logo.png" alt="Eye on AI" class="welcome-logo">
            <h2>Chatbot</h2>
            <p>Chat with 300+ episodes of the Eye on AI podcast. Ask about guests, topics, AI research, and more — answers grounded in actual transcripts.</p>
            <div class="examples">
                <button onclick="askExample(this)">What has the podcast covered about large language models?</button>
                <button onclick="askExample(this)">Which episodes feature interviews about AI safety?</button>
                <button onclick="askExample(this)">What did Geoff Hinton discuss on the show?</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Ask about the podcast..." autocomplete="off" />
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <div class="powered-by">
        <a href="https://www.eye-on.ai" target="_blank">eye-on.ai</a>
    </div>

    <script>
        const chatEl = document.getElementById('chat');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusEl = document.getElementById('status');
        const welcomeEl = document.getElementById('welcome');

        let conversationHistory = [];
        let isLoading = false;

        const API_BASE = window.location.origin;

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.indexed_chunks > 0) {
                    statusEl.textContent = `${data.indexed_chunks.toLocaleString()} chunks indexed`;
                    statusEl.className = 'status ready';
                } else {
                    statusEl.textContent = 'Indexing...';
                    setTimeout(checkStatus, 30000);
                }
            } catch (e) {
                statusEl.textContent = 'Offline';
            }
        }
        checkStatus();

        function askExample(btn) {
            inputEl.value = btn.textContent.replace(/^→\s*/, '');
            sendMessage();
        }

        function addMessage(role, content, sources) {
            if (welcomeEl) welcomeEl.style.display = 'none';

            const div = document.createElement('div');
            div.className = `message ${role}`;

            if (role === 'assistant' && sources && sources.length > 0) {
                div.innerHTML = `
                    <div>${formatContent(content)}</div>
                    <div class="sources">
                        Sources: ${sources.map(s => `<span>${s}</span>`).join('')}
                    </div>
                `;
            } else {
                div.innerHTML = formatContent(content);
            }

            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
            return div;
        }

        function formatContent(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const question = inputEl.value.trim();
            if (!question || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            inputEl.value = '';

            addMessage('user', question);
            showTyping();

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        conversation_history: conversationHistory,
                    }),
                });

                hideTyping();

                if (!res.ok) {
                    const err = await res.json();
                    addMessage('system', `Error: ${err.detail || 'Something went wrong'}`);
                    return;
                }

                const data = await res.json();
                addMessage('assistant', data.answer, data.sources);

                conversationHistory.push(
                    { role: 'user', content: question },
                    { role: 'assistant', content: data.answer }
                );

                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }

                checkStatus();
            } catch (e) {
                hideTyping();
                addMessage('system', 'Failed to connect to the server.');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.focus();
    </script>
</body>
</html>
