version: "3.8"

services:
  chatbot:
    build: .
    container_name: eye-on-ai-chatbot
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Persist ChromaDB data across container restarts
      - ./chroma_data:/app/chroma_data
      # Mount credentials (not baked into image)
      - ./credentials.json:/app/credentials.json:ro
      # Persist ingestion state
      - ./ingestion_state.json:/app/ingestion_state.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
